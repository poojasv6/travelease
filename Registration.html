<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Register | TravelEase</title>
  <link rel="stylesheet" href="register.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body>
  <div class="register-container">
    <form action="/RegistrationValidation" method="POST" class="register-form" onsubmit="return validateForm()">
      <h2><i class="fas fa-map-marker-alt"></i> TravelEase Registration</h2>

      <div class="input-group">
        <label for="name"><i class="fas fa-user"></i> Full Name</label>
        <input type="text" id="name" name="name" placeholder="Enter your full name" required>
      </div>

      <div class="input-group">
        <label for="email"><i class="fas fa-envelope"></i> Email</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required>
      </div>

      <div class="input-group">
        <label for="psw"><i class="fas fa-lock"></i> Password</label>
        <input type="password" id="psw" name="psw" placeholder="Enter your password" required>
      </div>

      <div class="input-group">
        <label for="cpass"><i class="fas fa-lock"></i> Confirm Password</label>
        <input type="password" id="cpass" name="cpass" placeholder="Confirm your password" required>
      </div>

      <div class="input-group">
        <label for="place"><i class="fas fa-location-dot"></i> Place</label>
        <input type="text" id="place" name="place" placeholder="Enter your city or town" required>
      </div>

      <div class="input-group">
        <label for="phone"><i class="fas fa-phone"></i> Phone Number</label>
        <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" pattern="[0-9]{10}" required>
      </div>

      <button type="submit" class="submit-btn">Register Now</button>

      <p class="login-link">Already have an account? <a href="Login.html">Login here</a></p>
    </form>
  </div>

  <script>
    function validateForm() {
      const phone = document.getElementById("phone").value;
      const pass = document.getElementById("psw").value;
      const cpass = document.getElementById("cpass").value;

      if (phone.length < 10) {
        alert("Please enter a valid 10-digit phone number.");
        return false;
      }
      if (pass !== cpass) {
        alert("Passwords do not match.");
        return false;
      }
      return true;
    }
  </script>
  <script>
  document.getElementById('registrationForm').addEventListener('submit', function (e) {
    e.preventDefault();

    // Simulate registration success (you can replace this with actual form submission via fetch or AJAX)
    localStorage.setItem('isRegistered', 'true');

    const redirectPlace = localStorage.getItem('redirectAfterRegister');
    if (redirectPlace) {
      localStorage.removeItem('redirectAfterRegister');
      window.location.href = `destination-info.html?place=${encodeURIComponent(redirectPlace)}`;
    } else {
      window.location.href = 'index.html'; // Default redirect if no destination
    }
  });
</script>

</body>
</html>
