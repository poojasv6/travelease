<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Register | TravelEase</title>
  <link rel="stylesheet" href="register.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body>
  <div class="register-container">
    <form class="register-form" onsubmit="return validateForm()">
      <h2><i class="fas fa-map-marker-alt"></i> TravelEase Registration</h2>

      <div class="input-group">
        <label for="name"><i class="fas fa-user"></i> Full Name</label>
        <input type="text" id="name" placeholder="Enter your full name" required>
      </div>

      <div class="input-group">
        <label for="email"><i class="fas fa-envelope"></i> Email</label>
        <input type="email" id="email" placeholder="Enter your email" required>
      </div>

      <div class="input-group">
        <label for="password"><i class="fas fa-lock"></i> Password</label>
        <input type="password" id="password" placeholder="Enter your password" required>
      </div>

      <div class="input-group">
        <label for="place"><i class="fas fa-location-dot"></i> Place</label>
        <input type="text" id="place" placeholder="Enter your city or town" required>
      </div>

      <div class="input-group">
        <label for="phone"><i class="fas fa-phone"></i> Phone Number</label>
        <input type="tel" id="phone" placeholder="Enter your phone number" required>
      </div>

      <button type="submit" class="submit-btn">Register Now</button>

      <p class="login-link">Already have an account? <a href="#">Login</a></p>
    </form>
  </div>

  <script>
    function validateForm() {
      const phone = document.getElementById("phone").value;
      if (phone.length < 10) {
        alert("Please enter a valid phone number.");
        return false;
      }
      return true;
    }
  </script>
</body>
</html>
